<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Festa de Maio</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <link rel="stylesheet" href="css/styles.css">
</head>
<body>
    <header>
        <h1>Festa de Maio: Família Souza</h1>
    </header>
    <main>
        <!-- Formulário de Seleção -->
        <label for="produtos">Produto:</label>
        <select id="produtos" name="produtos">
            <option value="selecioneProduto">Selecione um produto</option>
        </select>
        
        <label for="quantidade">Quantidade:</label>
        <input type="number" id="quantidade" name="quantidade" min="1" value="1">
        
        <button type="button" class="btn-adicionar">Adicionar Item</button>

        <!-- Carrinho de Compras -->
        <div class="carrinho-container">
            <div class="carrinho-titulo">Resumo do Pedido</div>
            
            <ul class="lista-itens" id="listaItens">
                <!-- Os itens reais vão entrar aqui via JavaScript -->
                <li class="item-carrinho">
                    <div>
                        <span class="item-qtd"></span>
                        <span class="item-detalhes"></span>
                    </div>
                    <span class="item-preco">R$ 0,00</span>
                </li>
            </ul>

            <!-- Totalizador -->
            <div class="total-container">
                <span>TOTAL:</span>
                <span class="total-valor" id="totalValor">R$ 0,00</span>
            </div>
            
            <button type="button" class="btn-finalizar">Finalizar e Imprimir</button>
        </div>
    </main>
    <script src="src/script.js" type="module"></script>
</body>
</html>
